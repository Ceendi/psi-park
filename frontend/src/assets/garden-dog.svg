<svg viewBox="0 0 800 1100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%;display:block;">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4FBF1"/>
      <stop offset="0.5" stop-color="#E3F2DD"/>
      <stop offset="1" stop-color="#BFE2C0"/>
    </linearGradient>
    <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#AEDBAE"/><stop offset="1" stop-color="#8FCB94"/>
    </linearGradient>
    <linearGradient id="hillMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7BC081"/><stop offset="1" stop-color="#56A85F"/>
    </linearGradient>
    <linearGradient id="hillFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#52A65B"/><stop offset="1" stop-color="#2E7D32"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFF1C4" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#FFE9A8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFE9A8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dogBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4CE61"/><stop offset="1" stop-color="#E2A93C"/>
    </linearGradient>
    <linearGradient id="dogEar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9854A"/><stop offset="1" stop-color="#A86535"/>
    </linearGradient>
    <radialGradient id="ball" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#E2685F"/><stop offset="1" stop-color="#BE3F36"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="1100" fill="url(#sky)"/>

  <!-- Sun + glow -->
  <circle cx="652" cy="196" r="300" fill="url(#sunGlow)"/>
  <circle cx="652" cy="196" r="60" fill="#FFE08A"/>
  <circle cx="640" cy="184" r="38" fill="#FFF1C4" opacity="0.55"/>

  <!-- Birds -->
  <g stroke="#1B5E20" stroke-width="2.6" fill="none" stroke-linecap="round" opacity="0.38">
    <path d="M150 250 q11 -9 20 0 q9 -9 20 0"/>
    <path d="M205 296 q8 -7 15 0 q7 -7 15 0"/>
  </g>

  <!-- Clouds -->
  <g fill="#FFFFFF">
    <g opacity="0.94">
      <ellipse cx="430" cy="150" rx="46" ry="30"/>
      <ellipse cx="470" cy="138" rx="40" ry="36"/>
      <ellipse cx="512" cy="155" rx="42" ry="27"/>
      <rect x="426" y="156" width="128" height="28" rx="14"/>
    </g>
    <g opacity="0.8">
      <ellipse cx="150" cy="120" rx="34" ry="22"/>
      <ellipse cx="184" cy="112" rx="28" ry="24"/>
      <rect x="148" y="122" width="76" height="20" rx="10"/>
    </g>
    <g opacity="0.66">
      <ellipse cx="650" cy="380" rx="30" ry="18"/>
      <ellipse cx="678" cy="374" rx="24" ry="20"/>
      <rect x="648" y="380" width="60" height="16" rx="8"/>
    </g>
  </g>

  <!-- Far hills -->
  <path d="M0 600 Q200 522 420 560 Q620 596 800 542 L800 720 L0 720 Z" fill="url(#hillFar)"/>
  <!-- Mid hills -->
  <path d="M0 700 Q230 622 450 668 Q650 710 800 648 L800 800 L0 800 Z" fill="url(#hillMid)"/>

  <!-- Trees on the mid hill -->
  <g>
    <g transform="translate(96 690)">
      <rect x="-6" y="0" width="12" height="30" rx="4" fill="#7A4A2B"/>
      <circle cx="0" cy="-20" r="36" fill="#2E7D32"/>
      <circle cx="-18" cy="-4" r="25" fill="#33893A"/>
      <circle cx="18" cy="-6" r="23" fill="#2E7D32"/>
      <circle cx="-8" cy="-30" r="18" fill="#3E9E45" opacity="0.75"/>
    </g>
    <g transform="translate(632 678) scale(1.1)">
      <rect x="-6" y="0" width="12" height="30" rx="4" fill="#7A4A2B"/>
      <circle cx="0" cy="-20" r="36" fill="#2E7D32"/>
      <circle cx="-18" cy="-4" r="25" fill="#33893A"/>
      <circle cx="18" cy="-6" r="23" fill="#2E7D32"/>
      <circle cx="-8" cy="-30" r="18" fill="#3E9E45" opacity="0.75"/>
    </g>
    <g transform="translate(726 700) scale(0.82)">
      <rect x="-6" y="0" width="12" height="30" rx="4" fill="#7A4A2B"/>
      <circle cx="0" cy="-20" r="36" fill="#2E7D32"/>
      <circle cx="-18" cy="-4" r="25" fill="#33893A"/>
      <circle cx="18" cy="-6" r="23" fill="#2E7D32"/>
    </g>
  </g>

  <!-- Front hill -->
  <path d="M0 800 Q210 750 430 786 Q630 818 800 766 L800 1100 L0 1100 Z" fill="url(#hillFront)"/>
  <!-- soft light band along the crest -->
  <path d="M0 800 Q210 750 430 786 Q630 818 800 766 L800 812 Q630 864 430 832 Q210 796 0 846 Z" fill="#FFFFFF" opacity="0.07"/>

  <!-- Picket fence -->
  <g>
    <rect x="24" y="800" width="210" height="7" rx="3" fill="#FAFFFA" opacity="0.92"/>
    <rect x="24" y="822" width="210" height="7" rx="3" fill="#FAFFFA" opacity="0.92"/>
    <g fill="#FAFFFA">
      <path d="M30 790 l8 -8 l8 8 l0 50 l-16 0 z"/>
      <path d="M64 790 l8 -8 l8 8 l0 50 l-16 0 z"/>
      <path d="M98 790 l8 -8 l8 8 l0 50 l-16 0 z"/>
      <path d="M132 790 l8 -8 l8 8 l0 50 l-16 0 z"/>
      <path d="M166 790 l8 -8 l8 8 l0 50 l-16 0 z"/>
      <path d="M200 790 l8 -8 l8 8 l0 50 l-16 0 z"/>
    </g>
    <g fill="#0F3D14" opacity="0.06">
      <rect x="44" y="790" width="2" height="50"/>
      <rect x="112" y="790" width="2" height="50"/>
      <rect x="180" y="790" width="2" height="50"/>
    </g>
  </g>

  <!-- Flowers -->
  <g>
    <g transform="translate(96 1000) scale(1.1)"><g fill="#FFFFFF"><circle cx="0" cy="-6" r="4"/><circle cx="6" cy="-2" r="4"/><circle cx="4" cy="5" r="4"/><circle cx="-4" cy="5" r="4"/><circle cx="-6" cy="-2" r="4"/></g><circle r="3.6" fill="#E8B84A"/></g>
    <g transform="translate(680 1024) scale(1.25)"><g fill="#FFFFFF"><circle cx="0" cy="-6" r="4"/><circle cx="6" cy="-2" r="4"/><circle cx="4" cy="5" r="4"/><circle cx="-4" cy="5" r="4"/><circle cx="-6" cy="-2" r="4"/></g><circle r="3.6" fill="#E8B84A"/></g>
    <g transform="translate(150 1058) scale(0.95)"><g fill="#FFF1C4"><circle cx="0" cy="-6" r="4"/><circle cx="6" cy="-2" r="4"/><circle cx="4" cy="5" r="4"/><circle cx="-4" cy="5" r="4"/><circle cx="-6" cy="-2" r="4"/></g><circle r="3.6" fill="#C97B5A"/></g>
    <g transform="translate(726 960) scale(0.9)"><g fill="#FFFFFF"><circle cx="0" cy="-6" r="4"/><circle cx="6" cy="-2" r="4"/><circle cx="4" cy="5" r="4"/><circle cx="-4" cy="5" r="4"/><circle cx="-6" cy="-2" r="4"/></g><circle r="3.6" fill="#E8B84A"/></g>
  </g>

  <!-- Paw-print trail toward the dog -->
  <g fill="#1B5E20" opacity="0.2">
    <g transform="translate(150 1010) rotate(20)"><ellipse cx="0" cy="3" rx="6" ry="5"/><circle cx="-5" cy="-4" r="2"/><circle cx="0" cy="-6" r="2"/><circle cx="5" cy="-4" r="2"/></g>
    <g transform="translate(214 968) rotate(20)" opacity="0.85"><ellipse cx="0" cy="3" rx="6" ry="5"/><circle cx="-5" cy="-4" r="2"/><circle cx="0" cy="-6" r="2"/><circle cx="5" cy="-4" r="2"/></g>
    <g transform="translate(280 930) rotate(18)" opacity="0.7"><ellipse cx="0" cy="3" rx="6" ry="5"/><circle cx="-5" cy="-4" r="2"/><circle cx="0" cy="-6" r="2"/><circle cx="5" cy="-4" r="2"/></g>
  </g>

  <!-- Ball -->
  <g transform="translate(596 952)">
    <ellipse cx="0" cy="34" rx="26" ry="6" fill="#0F3D14" opacity="0.18"/>
    <circle r="28" fill="url(#ball)"/>
    <path d="M-26 -6 Q0 6 26 -6" stroke="#8E2B23" stroke-width="2.4" fill="none" opacity="0.55"/>
    <path d="M-22 14 Q0 24 22 14" stroke="#8E2B23" stroke-width="2.4" fill="none" opacity="0.45"/>
    <ellipse cx="-9" cy="-10" rx="8" ry="6" fill="#FFFFFF" opacity="0.45"/>
  </g>

  <!-- ====================== DOG (hero) ====================== -->
  <g transform="translate(330 620)">
    <!-- ground shadow -->
    <ellipse cx="105" cy="324" rx="104" ry="18" fill="#0F3D14" opacity="0.18"/>

    <!-- tail -->
    <path d="M150 248 Q192 244 202 202 Q206 180 190 182 Q176 190 174 216 Q170 240 142 256 Z" fill="#E0A23A"/>

    <!-- haunch + body -->
    <ellipse cx="105" cy="252" rx="82" ry="74" fill="url(#dogBody)"/>
    <ellipse cx="105" cy="176" rx="62" ry="66" fill="url(#dogBody)"/>
    <!-- chest / belly highlight -->
    <ellipse cx="105" cy="214" rx="42" ry="56" fill="#FFF6E0" opacity="0.9"/>

    <!-- front legs + paws -->
    <rect x="70" y="232" width="30" height="92" rx="15" fill="url(#dogBody)"/>
    <rect x="110" y="232" width="30" height="92" rx="15" fill="url(#dogBody)"/>
    <g stroke="#C2913F" stroke-width="2.4" stroke-linecap="round" opacity="0.7">
      <path d="M80 314 v8"/><path d="M85 316 v8"/><path d="M90 314 v8"/>
      <path d="M120 314 v8"/><path d="M125 316 v8"/><path d="M130 314 v8"/>
    </g>

    <!-- head -->
    <circle cx="105" cy="110" r="66" fill="url(#dogBody)"/>
    <!-- ears -->
    <path d="M52 72 Q22 78 23 132 Q25 168 50 172 Q63 162 61 124 Q59 94 66 78 Z" fill="url(#dogEar)"/>
    <path d="M158 72 Q188 78 187 132 Q185 168 160 172 Q147 162 149 124 Q151 94 144 78 Z" fill="url(#dogEar)"/>
    <!-- forehead light -->
    <ellipse cx="88" cy="72" rx="22" ry="14" fill="#FFFFFF" opacity="0.16"/>

    <!-- muzzle -->
    <ellipse cx="105" cy="136" rx="37" ry="31" fill="#FFF6E0"/>

    <!-- eyes -->
    <ellipse cx="82" cy="98" rx="7.5" ry="9.5" fill="#3A2A22"/>
    <ellipse cx="128" cy="98" rx="7.5" ry="9.5" fill="#3A2A22"/>
    <circle cx="84.5" cy="94" r="2.6" fill="#FFFFFF"/>
    <circle cx="130.5" cy="94" r="2.6" fill="#FFFFFF"/>

    <!-- nose + mouth + tongue -->
    <ellipse cx="105" cy="122" rx="12" ry="9" fill="#3A2A22"/>
    <ellipse cx="101" cy="119" rx="3.4" ry="2" fill="#FFFFFF" opacity="0.6"/>
    <path d="M105 131 Q105 145 92 147" stroke="#3A2A22" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M105 131 Q105 145 118 147" stroke="#3A2A22" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M99 147 Q105 168 111 147 Q105 156 99 147 Z" fill="#EE7E94"/>
    <path d="M105 150 L105 162" stroke="#D9637A" stroke-width="1.6" stroke-linecap="round"/>

    <!-- collar + tag -->
    <path d="M66 158 Q105 180 144 158 L140 172 Q105 192 70 172 Z" fill="#2E7D32"/>
    <circle cx="105" cy="186" r="8" fill="#E8B84A"/>
    <circle cx="105" cy="186" r="3.4" fill="#C9923A"/>
  </g>

  <!-- Butterfly fluttering by the dog -->
  <g transform="translate(556 720)">
    <path d="M0 0 Q-16 -14 -22 -2 Q-18 10 0 6 Z" fill="#E8B84A"/>
    <path d="M0 0 Q16 -14 22 -2 Q18 10 0 6 Z" fill="#E8B84A"/>
    <path d="M0 2 Q-12 8 -16 18 Q-8 22 0 10 Z" fill="#C97B5A"/>
    <path d="M0 2 Q12 8 16 18 Q8 22 0 10 Z" fill="#C97B5A"/>
    <ellipse cx="0" cy="4" rx="2" ry="7" fill="#3A2A22"/>
    <path d="M0 -2 Q-4 -10 -8 -12 M0 -2 Q4 -10 8 -12" stroke="#3A2A22" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- grass tufts along the bottom -->
  <g stroke="#1B5E20" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M30 1090 Q33 1058 40 1036"/><path d="M44 1092 Q48 1062 55 1042"/><path d="M58 1088 Q61 1060 68 1040"/>
    <path d="M690 1090 Q694 1058 702 1036"/><path d="M706 1092 Q710 1062 718 1042"/>
    <path d="M770 1088 Q773 1058 781 1038"/>
  </g>
</svg>
