name: CI

# Gate for every PR to main + sanity check on main itself.
# During the bootstrap phase (no backend/ or frontend/ yet) the jobs detect the
# absence of code and pass green with a notice, so the required check never gets
# stuck "pending". Real checks activate automatically once B0 / F0 land.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: psipark
          POSTGRES_PASSWORD: psipark
          POSTGRES_DB: psipark_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U psipark"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-not-for-production
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://psipark:psipark@localhost:5432/psipark_test
      REDIS_URL: redis://localhost:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
      EMAIL_HOST: localhost
      EMAIL_PORT: "1025"
      DEFAULT_FROM_EMAIL: noreply@psipark.local
      PLATFORM_FEE_PERCENT: "10"
      FRONTEND_BASE_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: Detect backend
        id: detect
        run: |
          if [ -f backend/manage.py ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::backend/ not present yet (bootstrap phase) — skipping backend checks."
          fi

      - name: Set up Python
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install system libraries (WeasyPrint)
        if: steps.detect.outputs.present == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev \
            shared-mime-info fonts-liberation

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint + format check
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .

      - name: Missing-migrations check
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run

      - name: Tests (pytest + coverage)
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: pytest

      - name: OpenAPI schema drift check
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: |
          python manage.py spectacular --file schema.yaml
          git diff --exit-code -- schema.yaml \
            || { echo "::error::backend/schema.yaml is stale — run 'python manage.py spectacular --file schema.yaml' and commit it (see CLAUDE.md §5)."; exit 1; }

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect frontend
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/ not present yet (bootstrap phase) — skipping frontend checks."
          fi

      - name: Set up Node
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm ci

      - name: Lint (ESLint)
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run typecheck

      - name: Unit tests (Vitest)
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        env:
          CI: "true"
        run: npm run test -- --run

      - name: Production build
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run build
