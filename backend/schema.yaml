openapi: 3.0.3
info:
  title: PsiPark API
  version: 1.0.0
  description: Marketplace wynajmu prywatnych ogrodów dla psów.
paths:
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: POST /auth/login/ — e-mail + password to a token pair (anti-bruteforce
        throttled).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: POST /auth/logout/ — blacklist the supplied refresh token.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Logout'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Logout'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Logout'
        required: true
      security:
      - jwtAuth: []
      responses:
        '205':
          description: No response body
  /api/v1/auth/password/reset/:
    post:
      operationId: auth_password_reset_create
      description: POST /auth/password/reset/ — e-mail a reset link (always 200, no
        enumeration).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/v1/auth/password/reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: POST /auth/password/reset/confirm/ — set a new password from a
        reset token.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/v1/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        POST /auth/refresh/ — rotate the refresh token and issue a new access token.

        Rotation + blacklist-after-rotation are configured in ``SIMPLE_JWT`` (PLAN AD-3),
        so a rotated (old) refresh token is rejected on reuse.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: POST /auth/register/ — create a client/host account and return
        tokens + profile.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
          description: ''
  /api/v1/dogs/:
    get:
      operationId: dogs_list
      description: GET /dogs/ — the logged-in client's dogs; POST /dogs/ — add a dog.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - dogs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDogListList'
          description: ''
    post:
      operationId: dogs_create
      description: GET /dogs/ — the logged-in client's dogs; POST /dogs/ — add a dog.
      tags:
      - dogs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DogWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DogWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DogWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DogDetail'
          description: ''
  /api/v1/dogs/{id}/:
    get:
      operationId: dogs_retrieve
      description: GET/PATCH/DELETE /dogs/{id}/ — only the owner's own dog (others
        → 404).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - dogs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DogDetail'
          description: ''
    patch:
      operationId: dogs_partial_update
      description: GET/PATCH/DELETE /dogs/{id}/ — only the owner's own dog (others
        → 404).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - dogs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDogWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDogWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDogWrite'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DogDetail'
          description: ''
    delete:
      operationId: dogs_destroy
      description: GET/PATCH/DELETE /dogs/{id}/ — only the owner's own dog (others
        → 404).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - dogs
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/dogs/{id}/photo/:
    post:
      operationId: dogs_photo_create
      description: POST /dogs/{id}/photo/ — upload (compress + store) the dog's avatar.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - dogs
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DogPhoto'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DogPhoto'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DogDetail'
          description: ''
  /api/v1/gardens/:
    get:
      operationId: gardens_list
      description: GET /gardens/ — public catalogue of approved, active gardens with
        filters/sort.
      parameters:
      - in: query
        name: amenities
        schema:
          type: string
      - in: query
        name: city
        schema:
          type: string
      - in: query
        name: date
        schema:
          type: string
          format: date
      - in: query
        name: in_bbox
        schema:
          type: string
      - in: query
        name: max_dogs
        schema:
          type: integer
      - in: query
        name: max_price
        schema:
          type: number
      - in: query
        name: min_area
        schema:
          type: integer
      - in: query
        name: min_price
        schema:
          type: number
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: surface_type
        schema:
          type: string
          enum:
          - grass
          - mixed
          - paved
          - sand
        description: |-
          * `grass` - Trawa
          * `sand` - Piasek
          * `paved` - Utwardzona
          * `mixed` - Mieszana
      - in: query
        name: time_from
        schema:
          type: string
          format: time
      - in: query
        name: time_to
        schema:
          type: string
          format: time
      tags:
      - gardens
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGardenListList'
          description: ''
  /api/v1/gardens/{id}/:
    get:
      operationId: gardens_retrieve
      description: GET /gardens/{id}/ — public detail; owner/admin may also open their
        pending garden.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - gardens
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GardenDetail'
          description: ''
  /api/v1/gardens/{id}/availability/:
    get:
      operationId: gardens_availability_retrieve
      description: GET /gardens/{id}/availability/?date=YYYY-MM-DD — hourly slot map
        for a day.
      parameters:
      - in: query
        name: date
        schema:
          type: string
        description: YYYY-MM-DD
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - gardens
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Availability'
          description: ''
  /api/v1/health/:
    get:
      operationId: health_retrieve
      description: |-
        Liveness/readiness probe used by the Docker healthcheck.

        Returns 200 only when the database and Redis are reachable, 503 otherwise.
      tags:
      - health
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: ''
  /api/v1/host/gardens/:
    get:
      operationId: host_gardens_list
      description: GET /host/gardens/ — the host's gardens (any status); POST — create
        one (pending).
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - host
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGardenListList'
          description: ''
    post:
      operationId: host_gardens_create
      description: GET /host/gardens/ — the host's gardens (any status); POST — create
        one (pending).
      tags:
      - host
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GardenWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GardenWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GardenWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GardenDetail'
          description: ''
  /api/v1/host/gardens/{id}/:
    get:
      operationId: host_gardens_retrieve
      description: GET/PATCH/DELETE /host/gardens/{id}/ — manage one of the host's
        own gardens.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - host
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GardenDetail'
          description: ''
    patch:
      operationId: host_gardens_partial_update
      description: GET/PATCH/DELETE /host/gardens/{id}/ — manage one of the host's
        own gardens.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - host
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedGardenWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedGardenWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedGardenWrite'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GardenDetail'
          description: ''
    delete:
      operationId: host_gardens_destroy
      description: GET/PATCH/DELETE /host/gardens/{id}/ — manage one of the host's
        own gardens.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - host
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/host/gardens/{id}/photos/:
    post:
      operationId: host_gardens_photos_create
      description: POST /host/gardens/{id}/photos/ — upload (compress + store) a gallery
        photo.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - host
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GardenPhotoUpload'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GardenPhotoUpload'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GardenPhoto'
          description: ''
  /api/v1/host/gardens/{id}/photos/{photo_id}/:
    delete:
      operationId: host_gardens_photos_destroy
      description: DELETE /host/gardens/{id}/photos/{photoId}/ — remove a gallery
        photo.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: photo_id
        schema:
          type: integer
        required: true
      tags:
      - host
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/host/gardens/{id}/photos/reorder/:
    patch:
      operationId: host_gardens_photos_reorder_partial_update
      description: PATCH /host/gardens/{id}/photos/reorder/ — set gallery order (cover
        first).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - host
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPhotoReorder'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPhotoReorder'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPhotoReorder'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GardenPhoto'
          description: ''
  /api/v1/host/reservations/:
    get:
      operationId: host_reservations_list
      description: GET /host/reservations/ — reservations on the host's gardens (paid
        only).
      parameters:
      - in: query
        name: garden
        schema:
          type: integer
        description: Restrict to one of the host's gardens.
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status_group
        schema:
          type: string
          enum:
          - accepted
          - cancelled
          - completed
          - pending
        description: Panel tab filter.
      tags:
      - host
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReservationListList'
          description: ''
  /api/v1/host/reservations/{id}/accept/:
    post:
      operationId: host_reservations_accept_create
      description: POST /host/reservations/{id}/accept/ — ``awaiting_host → confirmed``
        + e-mail.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - host
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationDetail'
          description: ''
  /api/v1/host/reservations/{id}/reject/:
    post:
      operationId: host_reservations_reject_create
      description: POST /host/reservations/{id}/reject/ — ``awaiting_host → rejected``
        + refund + e-mail.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - host
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationReject'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReservationReject'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReservationReject'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationDetail'
          description: ''
  /api/v1/host/schedule/:
    get:
      operationId: host_schedule_list
      description: GET /host/schedule/?from=&to=&garden= — committed reservations
        as calendar events.
      parameters:
      - in: query
        name: from
        schema:
          type: string
        description: YYYY-MM-DD (inclusive).
        required: true
      - in: query
        name: garden
        schema:
          type: integer
        description: Restrict to one of the host's gardens.
      - in: query
        name: to
        schema:
          type: string
        description: YYYY-MM-DD (inclusive).
        required: true
      tags:
      - host
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleEvent'
          description: ''
  /api/v1/host/stats/:
    get:
      operationId: host_stats_retrieve
      description: GET /host/stats/ — dashboard tiles (counts, earnings, average rating).
      tags:
      - host
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostStats'
          description: ''
  /api/v1/me/:
    get:
      operationId: me_retrieve
      description: /me/ — read, update, or deactivate (GDPR) the logged-in account.
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: me_partial_update
      description: /me/ — read, update, or deactivate (GDPR) the logged-in account.
      tags:
      - me
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMeUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMeUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMeUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    delete:
      operationId: me_destroy
      description: /me/ — read, update, or deactivate (GDPR) the logged-in account.
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/me/password/:
    patch:
      operationId: me_password_partial_update
      description: PATCH /me/password/ — change password while authenticated.
      tags:
      - me
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPasswordChange'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPasswordChange'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPasswordChange'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
          description: ''
  /api/v1/reservations/:
    get:
      operationId: reservations_list
      description: GET /reservations/ — the client's own bookings; POST — create one
        (pending_payment).
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status_group
        schema:
          type: string
          enum:
          - cancelled
          - completed
          - upcoming
        description: Panel tab filter.
      tags:
      - reservations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReservationListList'
          description: ''
    post:
      operationId: reservations_create
      description: GET /reservations/ — the client's own bookings; POST — create one
        (pending_payment).
      tags:
      - reservations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReservationCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReservationCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationDetail'
          description: ''
  /api/v1/reservations/{id}/:
    get:
      operationId: reservations_retrieve
      description: GET /reservations/{id}/ — detail for a participant (client or the
        garden's host).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - reservations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationDetail'
          description: ''
  /api/v1/reservations/{id}/cancel/:
    post:
      operationId: reservations_cancel_create
      description: POST /reservations/{id}/cancel/ — client cancels; response carries
        ``refunded``.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - reservations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelResult'
          description: ''
  /api/v1/reservations/export.csv:
    get:
      operationId: reservations_export.csv_retrieve
      description: GET /reservations/export.csv — the client's reservations as a CSV
        download.
      tags:
