      enum:
      - pool
      - water
      - shelter
      - lighting
      - parking
      - agility
      - bench
      - bin
      - fenced_secure
      - shade
      type: string
      description: |-
        * `pool` - Basen dla psów
        * `water` - Woda i miski
        * `shelter` - Wiata / schronienie
        * `lighting` - Oświetlenie wieczorne
        * `parking` - Parking
        * `agility` - Tor agility
        * `bench` - Ławki dla opiekuna
        * `bin` - Kosze na odchody
        * `fenced_secure` - Pełne ogrodzenie 1,8 m
        * `shade` - Naturalny cień / drzewa
